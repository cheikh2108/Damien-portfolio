<!doctype html>
<html lang="en" style="background-color:#f5f5f5" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Damien — Portfolio</title>

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { background-color: #f5f5f5; }
    </style>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              geist: ['Geist', 'sans-serif'],
              inter: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
  </head>
  <body style="background-color:#f5f5f5" class="h-full antialiased selection:bg-neutral-900 selection:text-white text-neutral-900 bg-neutral-100 font-geist">
    <div id="root" style="background-color:#f5f5f5"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
